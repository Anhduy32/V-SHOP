name: V-Shop Voucher AI Build Management

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'src/main/java/com/vshop/logic/**'
      - 'pom.xml'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Quality Guard - Keyword Scan
        run: |
          if grep -r "TODO_FIX_VOUCHER" src/main/java; then
            echo "❌ LỖI: Phát hiện mã chưa hoàn thiện!"
            exit 1
          fi

      - name: Run Tests with Maven
        run: mvn clean test

      - name: Package Artifact
        if: success()
        run: mvn package -DskipTests

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: VShop-Voucher-AI-Package
          path: target/*.jar