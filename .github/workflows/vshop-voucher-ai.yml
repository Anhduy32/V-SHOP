name: V-Shop Voucher AI Build Management

on:
  push:
    branches: [ "main", "develop" ]
    # Kích hoạt khi có thay đổi trong thư mục java của bạn
    paths:
      - 'src/main/java/**'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout mã nguồn
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 2. Thiết lập Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # LỚP BẢO VỆ 1: Quét từ khóa trực tiếp trong thư mục java của bạn
      - name: Layer 1 - Quality Guard (Keyword Scan)
        run: |
          echo "🔍 Đang kiểm tra mã nguồn trong src/main/java..."
          if grep -r "TODO_FIX_VOUCHER" src/main/java; then
            echo "❌ LỖI: Phát hiện mã chưa hoàn thiện! Dừng pipeline."
            exit 1
          fi

      # BƯỚC BUILD: Trỏ trực tiếp vào file pom.xml nằm sâu trong thư mục
      - name: 3. Chạy Unit Test (Maven)
        run: mvn -f src/main/java/pom.xml clean test

      # Đóng gói file JAR (Bản build cuối cùng)
      - name: 4. Đóng gói sản phẩm (Package)
        if: success()
        run: mvn -f src/main/java/pom.xml package -DskipTests

      # Lưu trữ bản Build để có thể tải về từ GitHub
      - name: 5. Lưu trữ Build Artifact
        uses: actions/artifact@v3
        with:
          name: VShop-Voucher-AI-Package
          path: src/main/java/target/*.jar