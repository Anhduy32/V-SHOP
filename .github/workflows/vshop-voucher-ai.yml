name: V-Shop Voucher AI Build Management

on:
  push:
    # Thêm cả master và main để chắc chắn nhánh nào cũng chạy
    branches: [ "main", "master", "develop" ]
    paths:
      - 'src/main/java/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout mã nguồn
        uses: actions/checkout@v3

      - name: 2. Thiết lập Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # LỚP BẢO VỆ 1: QUÉT TỪ KHÓA CẤM (ĐỂ RA MÀU ĐỎ)
      - name: Layer 1 - Quality Guard
        run: |
          echo "🔍 Đang quét lỗi trong src/main/java..."
          if grep -r "TODO_FIX_VOUCHER" src/main/java; then
            echo "❌ LỖI NGHIÊM TRỌNG: Phát hiện mã chưa hoàn thiện!"
            exit 1
          fi

      # BƯỚC BUILD (Trỏ đúng vào file pom.xml nằm trong src/main/java)
      - name: 3. Chạy Maven Build
        run: mvn -f src/main/java/pom.xml clean package -DskipTests