name: V-Shop Voucher AI Build Management

on:
  push:
    branches: [ "main", "master" ]
  # ĐÂY LÀ DÒNG QUAN TRỌNG NHẤT ĐỂ TẠO NÚT BẤM CHẠY THỦ CÔNG
  workflow_dispatch: 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout mã nguồn
        uses: actions/checkout@v3

      - name: 2. Thiết lập Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # LỚP BẢO VỆ: ĐỂ RA MÀU ĐỎ 
      - name: Layer 1 - Quality Guard
        run: |
          echo "🔍 Đang quét mã nguồn V-Shop..."
          if grep -r "TODO_FIX_VOUCHER" .; then
            echo "❌ LỖI: Phát hiện từ khóa cấm! Dừng pipeline ngay."
            exit 1
          fi

      - name: 3. Chạy Maven Build
        run: mvn -f src/main/java/pom.xml clean package -DskipTests
